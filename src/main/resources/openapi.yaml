    GitCredentialCreateRequest:
      type: object
      required:
        - gitConnectionType
        - authenticationToken
      properties:
        gitConnectionType:
          type: string
          description: The type of git provider
          enum: ["github", "gitlab", "bitbucket", "azuredevops"]
          example: github
        authenticationToken:
          type: string
          description: The authentication token (e.g., personal access token)
          example: ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        externalId:
          type: string
          description: An optional organization-unique identifier for this credential. Set this if you want to reference the credential explicitly via `gitCredentialExternalId` when creating git connections; a credential without an `externalId` can only be resolved implicitly by `gitConnectionType`/`host`, and there is no other way to address it explicitly (the credential `id` and `tokenName` are not accepted). Must be unique across all credential scopes (organization, team, user) within the organization.
          example: my-github-ci
        host:
          type: string
          description: The git host URL
          example: github.com
        tokenName:
          type: string
          description: A display name for the token
          example: My GitHub PAT
        tokenType:
          type: string
          description: |
            The authentication method used for the token. Defaults to `authenticationToken` if not provided.
            - `authenticationToken` — A Personal Access Token (PAT), OAuth token, or Bitbucket Cloud repository/project/workspace Access Token, sent as a Bearer. No username is required. Use this for GitHub, GitLab, Azure DevOps, and Bitbucket Access Tokens.
            - `apiToken` — Basic authentication for Bitbucket Cloud, used with an Atlassian API token (recommended; username is the Atlassian account email) or with a Bitbucket App Password (deprecated by Atlassian; username is the workspace username). When using this type, the `username` field is required.
          enum: ["authenticationToken", "apiToken"]
          example: authenticationToken
        username:
          type: string
          description: The username for Basic authentication. Required when `gitConnectionType` is `bitbucket` and `tokenType` is `apiToken`. Use your Atlassian account email when authenticating with an API token, or your Bitbucket workspace username when authenticating with an App Password.
          example: jane.doe@example.com
    GitCredentialUpdateRequest:
      type: object
      required:
        - gitConnectionType
      properties:
        gitConnectionType:
          type: string
          description: The type of git provider
          enum: ["github", "gitlab", "bitbucket", "azuredevops"]
          example: github
        authenticationToken:
          type: string
          description: The authentication token. If omitted or blank, the existing token is preserved.
          example: ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
        externalId:
          type: string
          description: An optional organization-unique identifier for this credential. Use this endpoint to assign one to a credential that was created without it (for example, one created through the web UI) so it can be referenced explicitly via `gitCredentialExternalId`. Must be unique across all credential scopes (organization, team, user) within the organization.
          example: my-github-ci
        host:
          type: string
          description: The git host URL
          example: github.com
        tokenName:
          type: string
          description: A display name for the token
          example: My GitHub PAT
        tokenType:
          type: string
          description: |
            The authentication method used for the token. Defaults to `authenticationToken` if not provided.
            - `authenticationToken` — A Personal Access Token (PAT), OAuth token, or Bitbucket Cloud repository/project/workspace Access Token, sent as a Bearer. No username is required. Use this for GitHub, GitLab, Azure DevOps, and Bitbucket Access Tokens.
            - `apiToken` — Basic authentication for Bitbucket Cloud, used with an Atlassian API token (recommended; username is the Atlassian account email) or with a Bitbucket App Password (deprecated by Atlassian; username is the workspace username). When using this type, the `username` field is required.
          enum: ["authenticationToken", "apiToken"]
          example: authenticationToken
        username:
          type: string
          description: The username for Basic authentication. Required when `gitConnectionType` is `bitbucket` and `tokenType` is `apiToken`. Use your Atlassian account email when authenticating with an API token, or your Bitbucket workspace username when authenticating with an App Password.
          example: jane.doe@example.com
    OrganizationSettings:
      type: object
      description: Settings of the organization. The organization UUID is intentionally not exposed.
      properties:
        vanityUrl:
          type: string
