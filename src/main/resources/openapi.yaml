  /api/v1/traces:
    get:
      tags:
        - Usage
      summary: Get traces
      description: Retrieve OpenTelemetry traces filtered by scope name, data product ID, or data contract ID. Returns traces in OTLP/JSON format.
      operationId: getTraces
      parameters:
        - name: scopeName
          in: query
          description: Filter traces by scope name (e.g., "usage")
          required: false
          schema:
            type: string
            example: usage
        - name: dataProductId
          in: query
          description: Filter traces by data product external ID
          required: false
          schema:
            type: string
            example: orders
        - name: dataContractId
          in: query
          description: Filter traces by data contract external ID
          required: false
          schema:
            type: string
            example: snowflake_orders_pii_v2
      responses:
        200:
          description: Traces in OTLP/JSON format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtelTracesRequest'
    post:
      tags:
        - Usage
      summary: Submit traces
      description: |
        Submit OpenTelemetry traces in OTLP/JSON format to track data product usage. Traces should include:
        - Resource attributes: `service.name`, `dataproduct.id`, `outputport.name`
        - Span attributes: `user`, `role`, `type`, `query`, `rows`, `result`, `access.id`

        Traces older than 30 days are automatically deleted. Spans with duplicate `spanId` values are updated (upserted).
      operationId: postTraces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtelTracesRequest'
            example:
              resourceSpans:
                - resource:
                    attributes:
                      - key: service.name
                        value:
                          stringValue: snowflake
                      - key: dataproduct.id
                        value:
                          stringValue: orders
                      - key: outputport.name
                        value:
                          stringValue: snowflake_orders_pii_v2
                  scopeSpans:
                    - scope:
                        name: usage
                        version: 1.0.0
                      spans:
                        - traceId: trace001
                          spanId: span001
                          kind: SPAN_KIND_INTERNAL
                          startTimeUnixNano: 1704067200000000000
                          endTimeUnixNano: 1704067260000000000
                          attributes:
                            - key: user
                              value:
                                stringValue: ANALYTICS_TEAM
                            - key: role
                              value:
                                stringValue: ANALYST
                            - key: type
                              value:
                                stringValue: query
                            - key: query
                              value:
                                stringValue: SELECT * FROM orders WHERE date > '2024-01-01'
                            - key: rows
                              value:
                                intValue: 1523
                            - key: result
                              value:
                                stringValue: success
                            - key: access.id
                              value:
                                stringValue: access-abc123
      responses:
        200:
          description: Traces successfully submitted
    delete:
      tags:
        - Usage
      summary: Delete traces
      description: Delete traces filtered by scope name, data product ID, data contract ID, or span ID. If no filters are provided, all traces for the organization are deleted.
      operationId: deleteTraces
      parameters:
        - name: scopeName
          in: query
          description: Delete traces with this scope name
          required: false
          schema:
            type: string
            example: usage
        - name: dataProductId
          in: query
          description: Delete traces for this data product external ID
          required: false
          schema:
            type: string
            example: orders
        - name: dataContractId
          in: query
          description: Delete traces for this data contract external ID
          required: false
          schema:
            type: string
            example: snowflake_orders_pii_v2
        - name: spanId
          in: query
          description: Delete a specific trace by span ID
          required: false
          schema:
            type: string
            example: span001
      responses:
        200:
          description: Traces deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer
                    description: Number of traces deleted
                    example: 42
  /api/v1/lineage:
    post:
      tags:
        - Lineage
      summary: Submit OpenLineage event
      description: |
        Submit an OpenLineage RunEvent. Compatible with all OpenLineage producers (dbt-ol, Airflow, Spark, Flink, etc.).

        **Linking to data products:** Use either query parameters or the `entropy_data` run facet:

        Option 1 — Query parameters (via `urlParams` in OpenLineage transport config):
        ```yaml
        # openlineage.yml
        transport:
          type: http
          url: https://api.entropy-data.com
          endpoint: api/v1/lineage
          auth:
            type: api_key
            api_key: <entropy-data-api-key>
          urlParams:
            dataProductId: orders
            outputPortName: snowflake_orders_v2
        ```

        Option 2 — `entropy_data` run facet (embedded in event JSON):
        ```json
        {
          "run": {
            "runId": "...",
            "facets": {
              "entropy_data": {
                "_producer": "https://entropy-data.com",
                "_schemaURL": "https://entropy-data.com/spec/facets/1-0-0/EntropyDataRunFacet.json",
                "dataProductId": "orders",
                "outputPortName": "snowflake_orders_v2"
              }
            }
          }
        }
        ```

        Query parameters take precedence over the facet. Input/output datasets can also carry
        an `entropy_data` facet with an `assetId` to link datasets to Entropy Data assets.

        Events older than 90 days are automatically deleted.
      operationId: postLineageEvent
      parameters:
        - name: dataProductId
          in: query
          description: Data product external ID to associate the event with
          required: false
          schema:
            type: string
            example: orders
        - name: outputPortName
          in: query
          description: Output port name within the data product. Used to auto-resolve the data contract.
          required: false
          schema:
            type: string
            example: snowflake_orders_v2
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenLineageRunEvent'
            example:
              eventType: COMPLETE
              eventTime: "2024-01-15T10:00:00.000Z"
              run:
                runId: "d46e465b-d358-4d32-83d4-df660ff614dd"
              job:
                namespace: dbt
                name: my_model
              inputs:
                - namespace: snowflake://account.snowflakecomputing.com
                  name: raw_db.public.raw_orders
              outputs:
                - namespace: snowflake://account.snowflakecomputing.com
                  name: analytics_db.public.orders
              producer: "https://github.com/OpenLineage/OpenLineage/tree/0.18.0/integration/dbt"
      responses:
        200:
          description: Event successfully submitted
    get:
      tags:
        - Lineage
      summary: Get OpenLineage events
      description: Retrieve stored OpenLineage events filtered by job, run, event type, or data product.
      operationId: getLineageEvents
      parameters:
        - name: jobNamespace
          in: query
          description: Filter by job namespace
          required: false
          schema:
            type: string
            example: dbt
        - name: jobName
          in: query
          description: Filter by job name
          required: false
          schema:
            type: string
            example: my_model
        - name: runId
          in: query
          description: Filter by run ID
          required: false
          schema:
            type: string
        - name: eventType
          in: query
          description: Filter by event type (START, RUNNING, COMPLETE, ABORT, FAIL)
          required: false
          schema:
            type: string
            enum: [START, RUNNING, COMPLETE, ABORT, FAIL]
        - name: dataProductId
          in: query
          description: Filter by data product external ID
          required: false
          schema:
            type: string
            example: orders
      responses:
        200:
          description: List of OpenLineage events as raw JSON
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OpenLineageRunEvent'
    delete:
      tags:
        - Lineage
      summary: Delete OpenLineage events
      description: Delete OpenLineage events filtered by run ID, or job namespace and name. If no filters are provided, all events for the organization are deleted.
      operationId: deleteLineageEvents
      parameters:
        - name: runId
          in: query
          description: Delete events for this run ID
          required: false
          schema:
            type: string
        - name: jobNamespace
          in: query
          description: Delete events for this job namespace (requires jobName)
          required: false
          schema:
            type: string
            example: dbt
        - name: jobName
          in: query
          description: Delete events for this job name (requires jobNamespace)
          required: false
          schema:
            type: string
            example: my_model
      responses:
        200:
          description: Events deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer
                    description: Number of events deleted
                    example: 5
  /api/organization/members:
    get:
      tags:
        - Organization
      summary: Get all organization members
      description: Get all members of an organization.
      operationId: getOrganizationMembers
      parameters:
        - in: query
          name: p
          schema:
            type: integer
            minimum: 0
          required: false
          description: The number of the requested page, starting from 0. Each page contains a maximum of 1000 organization members, sorted by creation date ascending. Use the Link header with rel="next" to navigate to the next page.
      responses:
        200:
          description: List of all members of an organization
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationMember'
  /api/organization/members/{emailAddress}:
    parameters:
      - name: emailAddress
        in: path
        description: The emailAddress of an organization member
        required: true
        schema:
          type: string
    get:
      tags:
        - Organization
      summary: Get the current state of the organization member
      operationId: getOrganizationMember
      responses:
        200:
          description: The current state of the organization member
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/OrganizationMember'
        404:
          $ref: "#/components/responses/NotFound"
          description: Member not found
  /api/settings/team-roles:
    get:
      tags:
        - Team Roles
      summary: Get the team roles configuration
      description: >-
        Report whether team permissions are derived from the built-in default
        roles or from this organization's custom team role catalog. When the
        mode is `custom-team-roles`, the full catalog is returned in
        `team-roles`, sorted by `rank` ascending.
      operationId: getTeamRoles
      responses:
        200:
          description: The current team roles configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamRolesSettings'
        403:
          $ref: "#/components/responses/Forbidden"
    put:
      tags:
        - Team Roles
      summary: Set the team roles configuration
      description: >-
        Switch between the built-in default roles and a custom team role
        catalog.


        - `mode: default` activates the built-in default roles. Any existing
        custom roles are kept untouched (the switch is reversible), so
        `team-roles` is ignored.

        - `mode: custom-team-roles` activates the custom catalog and **replaces**
        it with exactly the roles in `team-roles` (matched by `name`). Roles not
        listed are deleted. Switching to custom with an empty or missing
        `team-roles` is rejected with 409, because an empty catalog would strip
        every member of all permissions. Dropping a role still assigned to a team
        member is likewise rejected with 409.
      operationId: putTeamRoles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamRolesSettings'
      responses:
        200:
          description: The updated team roles configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamRolesSettings'
        400:
          description: Invalid request — unknown mode, unknown permission, or duplicate role names
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        403:
          $ref: "#/components/responses/Forbidden"
        409:
          $ref: "#/components/responses/Conflict"
  /api/api-keys:
    post:
      tags:
        - API Keys
      summary: Create an API key
      description: Create a new team-scoped API key. Only `team` and `team_read` scopes are supported through the API. Requires an organization-scoped API Key to create this.
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - scope
              properties:
                displayName:
                  type: string
                  description: A human-readable name for the API key.
                scope:
                  type: string
                  enum:
                    - team
                    - team_read
                  description: "The scope of the API key. `team`: full read/write access to the team's resources. `team_read`: read-only access to the team's resources."
                teamId:
                  type: string
                  format: uuid
                  description: The ID of the team this API key is scoped to.
                expiresAt:
                  type: string
                  format: date
                  description: Optional expiration date for the API key. The key stays valid through the end of this day (UTC). Omit for a key that never expires.
            example:
              displayName: "CI/CD Pipeline Key"
              scope: "team"
              teamId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              expiresAt: "2026-12-31"
      responses:
        201:
          description: API key created successfully. The `key` field contains the secret API key and is only returned once.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreated'
        400:
          $ref: "#/components/responses/BadRequest"
          description: Invalid scope. Only `team` and `team_read` scopes are supported.
        403:
          $ref: "#/components/responses/Forbidden"
          description: Insufficient permissions on the team.
  /api/api-keys/{organizationApiKeyId}:
    parameters:
      - name: organizationApiKeyId
        in: path
        description: The ID of the API key
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags:
        - API Keys
      summary: Delete an API key
      description: Delete a team-scoped API key. Only team-scoped API keys can be deleted via this API. Requires `RESOURCES_EDIT` permission on the team.
      operationId: deleteApiKey
      responses:
        204:
          description: API key deleted successfully.
        403:
          $ref: "#/components/responses/Forbidden"
          description: Insufficient permissions or the API key is not team-scoped.
        404:
          $ref: "#/components/responses/NotFound"
          description: API key not found.
  /api/settings/customization:
    get:
      tags:
        - Organization
      summary: Get organization customization
      description: Get the customization YAML for the organization. Requires an organization-scoped API key.
      operationId: getCustomization
      responses:
        200:
          description: The customization YAML or JSON
          content:
            'application/yaml':
              schema:
                type: string
                description: The customization YAML
                example: |
                  dataProduct:
                    customFilters:
                      - displayName: Status
