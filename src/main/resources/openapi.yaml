    GitCredentialResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the git credential
        externalId:
          type: string
          nullable: true
          description: |
            The organization-unique identifier for this credential, or `null` if none was set. It is populated only when an `externalId` was supplied while creating or updating the credential via the API; credentials created through the web UI have no `externalId`.

            This is the only value accepted as `gitCredentialExternalId` when creating a git connection — the credential `id` (UUID) and `tokenName` are not. If this is `null` and you want to address the credential explicitly, assign an `externalId` first via `PUT /api/organization/gitcredentials/{id}` (or the team/user equivalent).
          example: my-github-ci
        gitConnectionType:
          type: string
          description: The type of git provider
          enum: ["github", "gitlab", "bitbucket", "azuredevops"]
          example: github
        host:
          type: string
          description: The git host URL
          example: github.com
        tokenName:
          type: string
          description: A display name for the token
          example: My GitHub PAT
        tokenType:
          type: string
          description: |
            The authentication method used for the token.
            - `authenticationToken` — A Personal Access Token (PAT), OAuth token, or Bitbucket Cloud Access Token sent as a Bearer. No username is required.
            - `apiToken` — Basic authentication for Bitbucket Cloud, used with an Atlassian API token (username is the Atlassian account email) or a Bitbucket App Password (username is the workspace username).
          enum: ["authenticationToken", "apiToken"]
          example: authenticationToken
        username:
          type: string
          description: The username used for Basic authentication when `tokenType` is `apiToken` (Atlassian account email for an API token, or Bitbucket workspace username for an App Password).
          example: jane.doe@example.com
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the credential was created
        createdBy:
          type: string
          description: Who created the credential
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the credential was last updated
        updatedBy:
          type: string
          description: Who last updated the credential
    DataContract:
      $ref: "schemas/odcs-json-schema-v3.1.0.json"
    GenerateRequest:
      type: object
      description: Request body for code generation.
      required:
        - type
      properties:
        type:
          type: string
          description: |
            The type of code to generate. Supported values:
            - `sql-select` - SQL SELECT statements
            - `sql-ddl` - SQL CREATE TABLE DDL statements
            - `dbt-models` - dbt model SQL files with schema YAML
            - `dbt-sources` - dbt sources YAML
            - `json-schema` - JSON Schema
            - `pydantic` - Python Pydantic models
            - `custom` - AI-powered custom code generation (requires prompt)
          enum:
            - sql-select
            - sql-ddl
            - dbt-models
            - dbt-sources
            - json-schema
            - pydantic
            - custom
          example: "sql-select"
        prompt:
          type: string
          description: The prompt for AI-powered custom code generation. Required when type is 'custom'.
          example: "Generate a Spark DataFrame reader for this data contract"
    GenerateResponse:
      type: object
      description: Response containing generated code files.
      required:
        - dataContractId
        - generationType
        - files
      properties:
        dataContractId:
          type: string
          description: The ID of the data contract used for generation.
          example: "my-data-contract"
        generationType:
          type: string
          description: The type of code that was generated.
          enum:
            - sql-select
            - sql-ddl
            - dbt-models
            - dbt-sources
            - json-schema
            - pydantic
            - custom
          example: "sql-select"
        files:
          type: array
          description: List of generated files.
          items:
            $ref: '#/components/schemas/GeneratedFile'
        prompt:
          type: string
          description: The prompt used for custom generation (only present for custom type).
          example: "Generate a Spark DataFrame reader"
    GeneratedFile:
      type: object
      description: A generated code file.
      required:
        - filename
        - language
        - content
      properties:
        filename:
          type: string
          description: The suggested filename for this generated code.
          example: "orders.sql"
        language:
          type: string
          description: The programming language or format of the generated code.
          example: "sql"
        content:
          type: string
          description: The generated code content.
          example: "SELECT\n    \"order_id\",\n    \"customer_id\"\nFROM \"orders\""
        metadata:
          type: object
          description: Additional metadata about the generated file.
          additionalProperties: true
          example:
            serverType: "snowflake"
    GitImportRequest:
      type: object
      description: |
        Request to import a data contract or data product from a Git repository.

        Credentials can be resolved in two ways:
        - **Explicit:** Set `gitCredentialExternalId` to reference a specific credential by its `externalId`. The `gitConnectionType` and `host` fields are optional and, if provided, are validated against the resolved credential.
        - **Implicit:** Set `gitConnectionType` (and optionally `host`) to resolve credentials automatically via the credential hierarchy (user → team → organization).

        At least one of `gitCredentialExternalId` or `gitConnectionType` must be provided.
      required:
        - repositoryUrl
        - repositoryPath
      properties:
        gitCredentialExternalId:
          type: string
          description: |
            The `externalId` of a git credential to use for authentication, exactly as returned in the `externalId` field of `GET /api/organization/gitcredentials` (or the team/user equivalent). When set, credentials are resolved by this identifier instead of by `gitConnectionType`/`host` matching.

            This must be the credential's `externalId` — not its `id` (UUID) and not its `tokenName`/Connection Name. Credentials created through the web UI have no `externalId`; to reference one explicitly, first assign an `externalId` via `PUT /api/organization/gitcredentials/{id}` (or the team/user equivalent). Otherwise omit this field and set `gitConnectionType` (and `host`) to resolve the credential implicitly.
          example: "my-github-ci"
        gitConnectionType:
          type: string
          description: The type of git provider. Required when `gitCredentialExternalId` is not provided. When both are provided, the value is validated against the resolved credential's type.
          enum:
            - github
            - gitlab
            - bitbucket
            - azuredevops
          example: "github"
        host:
          type: string
          description: The host of a self-hosted git provider instance. Required for self-hosted providers, omit for SaaS. When `gitCredentialExternalId` is provided, validated against the resolved credential's host.
          example: "https://gitlab.example.com"
        repositoryUrl:
          type: string
          description: The URL of the Git repository.
          example: "https://github.com/my-org/data-contracts"
        repositoryBranch:
          type: string
          description: The branch to use. Defaults to 'main'.
          default: "main"
          example: "main"
        repositoryPath:
          type: string
          description: The path to the YAML file in the repository.
          example: "contracts/my-contract.yaml"
    GitConnectionResponse:
      type: object
      description: Git connection details for a data contract or data product.
      properties:
        gitConnectionId:
          type: string
          format: uuid
          description: Unique identifier of the git connection.
        gitCredentialExternalId:
          type: string
          description: The `externalId` of the git credential used for this connection, if one was specified.
          example: "my-github-ci"
        gitConnectionType:
          type: string
          description: The type of git provider.
          enum:
            - github
            - gitlab
            - bitbucket
            - azuredevops
          example: "github"
        host:
          type: string
          description: The host of a self-hosted git provider instance. Null for SaaS providers.
          example: "https://gitlab.example.com"
        repositoryUrl:
          type: string
          description: The URL of the Git repository.
          example: "https://github.com/my-org/data-contracts"
        repositoryBranch:
          type: string
          description: The branch of the Git repository.
          example: "main"
        repositoryPath:
          type: string
          description: The path to the YAML file in the repository.
          example: "contracts/my-contract.yaml"
        syncStatus:
          type: string
          description: The sync status between the data contract and the Git file.
          enum:
            - UP_TO_DATE
            - LOCAL_IS_NEWER
            - REMOTE_IS_NEWER
            - CONFLICT
          example: "UP_TO_DATE"
        webLink:
          type: string
          description: A web link to the file in the Git provider UI.
          example: "https://github.com/my-org/data-contracts/blob/main/contracts/my-contract.yaml"
        lastHash:
          type: string
          description: The last known commit hash of the file.
          example: "abc123def456"
    GitConnectionRequest:
      type: object
      description: |
        Request to create or update a git connection for a data contract or data product.

        Credentials can be resolved in two ways:
        - **Explicit:** Set `gitCredentialExternalId` to reference a specific credential by its `externalId`. The `gitConnectionType` and `host` fields are optional and, if provided, are validated against the resolved credential.
        - **Implicit:** Set `gitConnectionType` (and optionally `host`) to resolve credentials automatically via the credential hierarchy (user → team → organization).

        At least one of `gitCredentialExternalId` or `gitConnectionType` must be provided.
      required:
        - repositoryUrl
        - repositoryPath
      properties:
        gitCredentialExternalId:
          type: string
          description: |
            The `externalId` of a git credential to use for authentication, exactly as returned in the `externalId` field of `GET /api/organization/gitcredentials` (or the team/user equivalent). When set, credentials are resolved by this identifier instead of by `gitConnectionType`/`host` matching.

            This must be the credential's `externalId` — not its `id` (UUID) and not its `tokenName`/Connection Name. Credentials created through the web UI have no `externalId`; to reference one explicitly, first assign an `externalId` via `PUT /api/organization/gitcredentials/{id}` (or the team/user equivalent). Otherwise omit this field and set `gitConnectionType` (and `host`) to resolve the credential implicitly.
          example: "my-github-ci"
        gitConnectionType:
          type: string
          description: The type of git provider. Required when `gitCredentialExternalId` is not provided. When both are provided, the value is validated against the resolved credential's type.
          enum:
            - github
            - gitlab
            - bitbucket
            - azuredevops
          example: "github"
        host:
          type: string
          description: The host of a self-hosted git provider instance. Required for self-hosted providers, omit for SaaS. When `gitCredentialExternalId` is provided, validated against the resolved credential's host.
          example: "https://gitlab.example.com"
        repositoryUrl:
          type: string
          description: The URL of the Git repository.
          example: "https://github.com/my-org/data-contracts"
        repositoryBranch:
          type: string
          description: The branch to use. Defaults to 'main'.
          default: "main"
          example: "main"
        repositoryPath:
          type: string
          description: The path to the YAML file in the repository.
          example: "contracts/my-contract.yaml"
    GitPushRequest:
      type: object
      description: Optional request body for pushing a data contract to Git.
      properties:
        commitMessage:
          type: string
          description: Custom commit message. If not provided, the default commit message template from the git setting is used.
          example: "Update data contract"
    GitPullRequestRequest:
      type: object
      description: Optional request body for pushing a data contract to Git as a pull request / merge request.
      properties:
        commitMessage:
          type: string
          description: Custom commit message for the commit on the new branch. If not provided, the default commit message template is used.
          example: "Update data contract"
        branchName:
