  /api/datacontracts/{id}:
    parameters:
      - name: id
        in: path
        description: An organizational unique technical identifier for this data contract, such as an UUID, URN, string, number. Format must be a valid path parameter for GET and DELETE requests, so no URI or '/' allowed.
        required: true
        schema:
          type: string
    put:
      tags:
        - Data Contracts
      operationId: addDataContract
      summary: Add or update a data contract. The data contract is the JSON structure of the internal YAML structure in Open Data Contract Standard (ODCS) format. Data Contract Specification (DCS) format is still accepted but deprecated (removal after 2026-12-31).
      responses:
        200:
          description: data contract successfully registered or updated
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: >-
            Data contract cannot be created or updated due to invalid data.
            The owner field is mandatory and must reference an existing team ID.
            For ODCS, set 'team.name' (ODCS 3.1.0+), a custom property 'owner', or 'domain' to a valid team ID.
            For the deprecated Data Contract Specification (DCS), set 'info.owner' to a valid team ID.
            If the provided team ID does not match any known team in the organization, a 422 error is returned.
      requestBody:
        required: true
        content:
          'application/json':
            schema:
              example: {
                "apiVersion": "v3.1.0",
                "kind": "DataContract",
                "id": "customer-cohorts",
                "name": "Customer Cohorts",
                "version": "1.0.0",
                "domain": "marketing",
                "status": "active",
                "description": {
                  "purpose": "A table with customer cohorts and their properties",
                  "usage": "Max. 10x queries per day",
                  "limitations": "Not suitable for real-time use cases"
                },
                "schema": [
                  {
                    "name": "customer_cohorts",
                    "physicalType": "table",
                    "properties": [
                      {
                        "name": "customer_id",
                        "logicalType": "string",
                        "description": "Unique customer identifier.",
                        "required": true,
                        "primaryKey": true
                      },
                      {
                        "name": "cohort_id",
                        "logicalType": "string",
                        "description": "Identifier for the cohort the customer belongs to.",
                        "required": true
                      },
                      {
                        "name": "cohort_name",
                        "logicalType": "string",
                        "description": "Name of the cohort."
                      },
                      {
                        "name": "start_date",
                        "logicalType": "date",
                        "description": "Start date of the cohort."
                      },
                      {
                        "name": "end_date",
                        "logicalType": "date",
                        "description": "End date of the cohort."
                      }
                    ]
                  }
                ],
                "team": {
                  "name": "marketing"
                }
              }
              $ref: '#/components/schemas/DataContract'
    get:
      tags:
        - Data Contracts
      summary: Get a data contract
      description: Get a data contract by its ID. The data contract is the JSON structure of the internal YAML structure in Open Data Contract Standard (ODCS) format. Data Contract Specification (DCS) format is still supported but deprecated (removal after 2026-12-31).
      operationId: getDataContract
      responses:
        200:
          description: The data contract
          content:
            'application/json':
              schema:
                example: {
                  "apiVersion": "v3.1.0",
                  "kind": "DataContract",
                  "id": "customer-cohorts",
                  "name": "Customer Cohorts",
                  "version": "1.0.0",
                  "domain": "marketing",
                  "status": "active",
                  "description": {
                    "purpose": "A table with customer cohorts and their properties",
                    "usage": "Max. 10x queries per day",
                    "limitations": "Not suitable for real-time use cases"
                  },
                  "schema": [
                    {
                      "name": "customer_cohorts",
                      "physicalType": "table",
                      "properties": [
                        {
                          "name": "customer_id",
                          "logicalType": "string",
                          "description": "Unique customer identifier.",
                          "required": true,
                          "primaryKey": true
                        },
                        {
                          "name": "cohort_id",
                          "logicalType": "string",
                          "description": "Identifier for the cohort the customer belongs to.",
                          "required": true
                        },
                        {
                          "name": "cohort_name",
                          "logicalType": "string",
                          "description": "Name of the cohort."
                        },
                        {
                          "name": "start_date",
                          "logicalType": "date",
                          "description": "Start date of the cohort."
                        },
                        {
                          "name": "end_date",
                          "logicalType": "date",
                          "description": "End date of the cohort."
                        }
                      ]
                    }
                  ],
                  "team": {
                    "name": "marketing"
                  }
                }
                $ref: '#/components/schemas/DataContract'
        404:
          $ref: "#/components/responses/NotFound"
          description: Data contract not found
    delete:
      summary: Delete a data contract
      operationId: deleteDataContract
      tags:
        - Data Contracts
      responses:
        200:
          description: Data contract was deleted
        404:
          $ref: "#/components/responses/NotFound"
          description: Data contract not found
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: data contract cannot be deleted, e.g. when it is still used in an output port of a data product
  /api/datacontracts/{id}/datacontract.yaml:
    parameters:
      - name: id
        in: path
        description: An organizational unique technical identifier for this data contract, such as an UUID, URN, string, number. Format must be a valid path parameter for GET and DELETE requests, so no URI or '/' allowed.
        required: true
        schema:
          type: string
    get:
      tags:
        - Data Contracts
      summary: Get the datacontract.yaml for a data contract in its original format (ODCS or deprecated DCS)
      operationId: getDataContractYaml
      responses:
        200:
          description: The datacontract.yaml
          content:
            'application/yaml':
              example: |-
                apiVersion: v3.1.0
                kind: DataContract
                id: search-queries
                name: Search Queries v2
                version: 1.0.0
                domain: search
                description:
                  purpose: All search queries with user interactions v2
                team:
                  name: my-team
        404:
          $ref: "#/components/responses/NotFound"
          description: Data contract not found
  /api/datacontracts/{id}/test:
    parameters:
      - name: id
        in: path
        description: The data contract ID.
        required: true
        schema:
          type: string
    post:
      tags:
        - Data Contracts
      summary: Run a data contract test
      description: |
        Runs a data contract test by sending the data contract YAML to the configured
        Data Contract CLI API endpoint. The test results are saved and returned.
        Requires that Data Contract Tests are enabled and configured for the organization.
      operationId: testDataContract
      parameters:
        - in: query
          name: server
          schema:
            type: string
          required: false
          description: The server name to test against. Required if the data contract has multiple servers configured.
      responses:
        200:
          description: Test results
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/TestResults'
        404:
          $ref: "#/components/responses/NotFound"
          description: Data contract not found
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: Data Contract Tests are not configured for this organization, or test execution failed
  /api/datacontracts/{id}/generate:
    parameters:
      - name: id
        in: path
        description: The data contract ID.
        required: true
        schema:
          type: string
    post:
      tags:
        - Data Contracts
      summary: Generate code from a data contract
      description: |
        Generate code artifacts from an ODCS (Open Data Contract Standard) data contract.
        Supports SQL, dbt, JSON Schema, Pydantic, and AI-powered custom code generation.
        Only works with data contracts using the ODCS specification type.
      operationId: generateDataContractCode
      requestBody:
        required: true
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        200:
          description: Successfully generated code
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        400:
          $ref: "#/components/responses/BadRequest"
          description: Invalid generation type or missing prompt for custom generation
        404:
          $ref: "#/components/responses/NotFound"
          description: Data contract not found
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: Data contract is not ODCS type or YAML parsing failed
  /api/datacontracts/import/git:
    post:
      tags:
        - Data Contracts
      summary: Import a data contract from a Git repository
      description: |
        Fetches a YAML file from a Git repository, creates or updates a data contract, and establishes a Git connection.
        Credentials are resolved either explicitly via `gitCredentialExternalId` or implicitly via `gitConnectionType`/`host` matching through the credential hierarchy.
      operationId: importDataContractFromGit
      requestBody:
        required: true
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/GitImportRequest'
      responses:
        201:
          description: Data contract created and git connection established
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/GitConnectionResponse'
        404:
          $ref: "#/components/responses/NotFound"
          description: Credential with the specified `gitCredentialExternalId` not found
        409:
          $ref: "#/components/responses/Conflict"
          description: File is already connected to a data contract
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: No git credentials found or invalid YAML
        502:
          $ref: "#/components/responses/BadGateway"
          description: Error communicating with the Git provider
  /api/datacontracts/{id}/gitconnection:
    parameters:
      - name: id
        in: path
        description: The data contract ID.
        required: true
        schema:
          type: string
    get:
      tags:
        - Data Contracts
      summary: Get the git connection of a data contract
      description: Returns the git connection details including sync status and web link.
      operationId: getDataContractGitConnection
      responses:
        200:
          description: Git connection details
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/GitConnectionResponse'
        404:
          $ref: "#/components/responses/NotFound"
          description: Data contract or git connection not found
    put:
      tags:
        - Data Contracts
      summary: Create or update a git connection for a data contract
      description: |
        Creates or updates the git connection for a data contract.
        Credentials are resolved either explicitly via `gitCredentialExternalId` or implicitly via `gitConnectionType`/`host` matching through the credential hierarchy.
      operationId: putDataContractGitConnection
      requestBody:
        required: true
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/GitConnectionRequest'
      responses:
        200:
          description: Git connection created or updated
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/GitConnectionResponse'
        404:
          $ref: "#/components/responses/NotFound"
          description: Credential with the specified `gitCredentialExternalId` not found
        409:
          $ref: "#/components/responses/Conflict"
          description: File is already connected to another data contract
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: No git credentials found
    delete:
      tags:
        - Data Contracts
      summary: Delete the git connection of a data contract
      description: Removes the git connection. The data contract itself is not affected.
      operationId: deleteDataContractGitConnection
      responses:
        200:
          description: Git connection deleted
        404:
          $ref: "#/components/responses/NotFound"
          description: Data contract not found
  /api/datacontracts/{id}/gitconnection/pull:
    parameters:
      - name: id
        in: path
        description: The data contract ID.
        required: true
        schema:
          type: string
    post:
      tags:
        - Data Contracts
      summary: Pull data contract from Git
      description: Fetches the latest version of the YAML file from the Git repository and updates the data contract.
      operationId: pullDataContractFromGit
      responses:
        200:
          description: Data contract updated from Git
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/GitConnectionResponse'
        404:
          $ref: "#/components/responses/NotFound"
          description: Data contract or git connection not found
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: Git setting not found, uses user-level auth, or invalid YAML
        502:
          $ref: "#/components/responses/BadGateway"
          description: Error communicating with the Git provider
  /api/datacontracts/{id}/gitconnection/push:
    parameters:
      - name: id
        in: path
        description: The data contract ID.
        required: true
        schema:
          type: string
    post:
      tags:
        - Data Contracts
      summary: Push data contract to Git
      description: Pushes the current data contract YAML to the connected Git repository.
      operationId: pushDataContractToGit
      requestBody:
        required: false
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/GitPushRequest'
      responses:
        200:
          description: Data contract pushed to Git
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/GitConnectionResponse'
        404:
          $ref: "#/components/responses/NotFound"
          description: Data contract or git connection not found
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: Git setting not found, uses user-level auth, or no YAML content
        502:
          $ref: "#/components/responses/BadGateway"
          description: Error communicating with the Git provider
  /api/datacontracts/{id}/gitconnection/push-pr:
    parameters:
      - name: id
        in: path
        description: The data contract ID.
        required: true
        schema:
          type: string
    post:
      tags:
        - Data Contracts
      summary: Push data contract to Git as a pull request
      description: |
        Creates a new branch, commits the current data contract YAML, and opens a pull request
        targeting the original branch. Supports GitHub, GitLab, Bitbucket, and Azure DevOps.
        For GitLab, a merge request is created instead of a pull request.
        All parameters are optional and have sensible defaults from the git connection settings.
      operationId: pushDataContractToGitAsPullRequest
      requestBody:
        required: false
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/GitPullRequestRequest'
      responses:
        200:
          description: Pull request created
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/GitConnectionResponse'
        404:
          $ref: "#/components/responses/NotFound"
          description: Data contract or git connection not found
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: Git setting not found, uses user-level auth, or no YAML content
        502:
          $ref: "#/components/responses/BadGateway"
          description: Error communicating with the Git provider
  /api/access:
    get:
      tags:
        - Access
      summary: Get all access resources
      operationId: getAccessList
      parameters:
        - in: query
          name: p
          schema:
            type: integer
            minimum: 0
          required: false
          description: The number of the requested page, starting from 0. Access resources are sorted by creation date ascending. Use the Link header with rel="next" to navigate to the next page.
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 2
            maximum: 10000
            default: 1000
          required: false
          description: The number of access resources returned per page. Must be between 2 and 10000.
        - in: query
          name: providerDataProductId
          schema:
            type: string
          required: false
          description: Filter access resources by provider data product ID. Only returns agreements where this data product is the provider.
        - in: query
          name: consumerDataProductId
          schema:
            type: string
          required: false
          description: Filter access resources by consumer data product ID. Only returns agreements where this data product is the consumer.
        - in: query
          name: consumerType
          schema:
