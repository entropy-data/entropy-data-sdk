        maximum:
          type: number
          description: "A value must be less than or equal to this value. Applies only to numeric types."
          example: 100
        exclusiveMinimum:
          type: number
          description: "A value must be greater than this value. Applies only to numeric types."
          example: 0
        exclusiveMaximum:
          type: number
          description: "A value must be less than this value. Applies only to numeric types."
          example: 100
        format:
          type: string
          description: "Specific format requirements for the value (e.g., 'email', 'uri', 'uuid')."
          example: "email"
        pattern:
          type: string
          description: "A regular expression pattern the value must match. Applies only to string types."
          example: "^[a-zA-Z0-9_]*$"
        example:
          type: string
          description: "An example value."
          example: "John Doe"
        pii:
          type: boolean
          description: "Indicates if the field contains Personal Identifiable Information (PII)."
          example: true
        classification:
          type: string
          description: "The data class defining the sensitivity level for this field."
          example: "sensitive"
        tags:
          type: array
          items:
            type: string
            example: "customer"
          description: "Custom metadata to provide additional context."
          example: [ "customer", "name" ]

    Asset:
      description: A data asset refers to any data-related resource or entity that can be managed and tracked within the system, such as a database table, file, or data pipeline.
      type: object
      properties:
        id:
          type: string
          description: An organizational unique technical identifier for this definition. Must be same as the path parameter.
          example: "047bde7c-87d4-488a-b6d2-cef6f6f60001"
        info:
          type: object
          description: Information about the asset.
          properties:
            owner:
              type: string
              description: The owner of the definition (the ID of a team). It is optional, but if it is set, it must be an existing team ID.
              example: "team-456"
            source:
              type: string
              description: The source of the asset.
              example: "snowflake"
            sourceId:
              type: string
              description: The source identifier of the asset.
              example: "047bde7c-87d4-488a-b6d2-cef6f6f60001"
            sourceUrl:
              type: string
              description: The URL of the source.
              example: "https://example.com/my-database/my-asset"
            type:
              type: string
              description: The type of the asset. For example snowflow_schema, databricks_table, ...
              example: "snowflake_table"
            name:
              type: string
              description: The display name of the asset. Typically the last segment of the qualified name.
              example: "my_table"
            qualifiedName:
              deprecated: true
              type: string
              description: The qualified name of the asset.
              example: "ORDERDB.PUBLIC.my_table"
            version:
              type: string
              description: The version of the asset.
              example: "0"
            status:
              type: string
              description: The status of the asset.
              example: "active"
            description:
              type: string
              description: A description of the asset.
              example: "This is a description."
        properties:
          type: object
          deprecated: true
          description: "Deprecated: use `custom` instead. Additional properties of the asset."
          additionalProperties: true
          example:
            account: "my_account"
            database: "ORDERDB"
            schema: "PUBLIC"
            table: "my_table"
        custom:
          type: object
          description: Additional custom properties of the asset. Can be a string or a complex object.
          additionalProperties: true
          example:
            account: "my_account"
            database: "ORDERDB"
            schema: "PUBLIC"
            table: "my_table"
        columns:
          type: array
          description: If the asset type has a schema (such as a table or structured files), define the columns. Columns support nested structures via `properties` (for object/record types) and `items` (for array types).
          items:
            $ref: '#/components/schemas/AssetColumn'
        relationships:
          type: array
          description: The relationships of the asset to other assets. A relationship from a child to its parent with relationshipType `parent` allows you to generate a datacontract with this relationship represented. Children will appear as such in the UI automatically.
          items:
            type: object
            properties:
              relationshipType:
                type: string
                description: The type of the relationship. Use `parent` to define a parent-child relationship.
                example: "parent"
              assetId:
                type: string
                description: The ID of the related asset (it should also be in the system).
                example: "047bde7c-87d4-488a-b6d2-cef6f6f60003"
        tags:
          type: array
          description: Tags associated with the asset.
          items:
            type: string
          example: ["pii:true", "classification:Full Name"]
        assignedTags:
          type: array
          description: Tags associated with the asset via UI.
          readOnly: true
          items:
            type: string
          example: [ "pii:true", "governance/internal" ]
        links:
          type: object
          description: Links associated with the asset.
          additionalProperties:
            type: string
          example:
            "Purview Data Map": "https://link1.com"
            "Azure SQL Explorer": "https://link2.com"
    AssetColumn:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: The name of the column.
          example: "orderId"
        type:
          type: string
          description: The type of the column from the type system of the data source (e.g., Avro types for Kafka, SQL types for databases).
          example: "string"
        description:
          type: string
          description: A description of the column.
          example: "Unique order identifier"
        required:
          type: boolean
          description: Whether this column is required.
        unique:
          type: boolean
          description: Whether this column must contain unique values.
        primaryKey:
          type: boolean
          description: Whether this column is a primary key.
        properties:
          type: array
          description: Nested columns for object/record types. Use this to define the fields of a structured column.
          items:
            $ref: '#/components/schemas/AssetColumn'
        items:
          $ref: '#/components/schemas/AssetColumn'
          description: Schema of array elements. Use this to define the structure of each item in an array column.
        qualifiedName:
          type: string
          deprecated: true
          description: "Deprecated: use a custom property instead. The qualified name of the column."
          example: "db.schema.table.column"
        tags:
          type: array
          description: Tags associated with the column.
          items:
            type: string
          example: ["pii", "financial"]
        links:
          type: object
          description: Links associated with the column.
          additionalProperties:
            type: string
        custom:
          type: object
          description: Additional custom properties of the column.
          additionalProperties: true
    AssetTags:
      type: array
      example: [ "pii:true", "governance/internal" ]
    ClassificationScheme:
      type: object
      required:
        - externalId
        - name
      properties:
        externalId:
          type: string
          description: Stable, organization-unique identifier of the scheme. Must match the path parameter on PUT.
          example: classification
        name:
          type: string
          description: Display name of the scheme.
          example: Classification
        description:
          type: string
          description: Optional description of what the scheme classifies.
          example: The sensitivity and confidentiality of the data.
        customProperty:
          type: string
          description: >
            The customProperty the scheme's value serializes to (ODPS/ODCS customProperties, semantic
            concept custom fields). The reserved value "classification" maps to the standard ODCS/ODPS
            classification field and marks this scheme as the organization's default. Leave blank to
            derive "classification.<externalId>".
          example: classification
        rank:
          type: integer
          description: Display order; lower is shown first. Assigned automatically when omitted.
          example: 1
        classifications:
          type: array
          description: The ordered classification tiers belonging to this scheme.
          items:
            $ref: '#/components/schemas/Classification'
    Classification:
      type: object
      required:
        - externalId
        - name
      properties:
        externalId:
          type: string
          description: Stable, scheme-unique identifier of the tier. Tiers are matched by this on sync.
          example: sensitive
        name:
          type: string
          description: Display name of the tier. This is the value serialized into specifications.
          example: Sensitive
        level:
          type: integer
          description: Sensitivity level; higher is more sensitive. Used to roll up to the most sensitive value.
          example: 4
        description:
          type: string
          description: Short description shown alongside the tier.
          example: Highly sensitive data, strictest controls.
        criteria:
          type: string
          description: Markdown guidance on when this tier applies.
        colorScheme:
          type: string
          description: Named color for the tier's badge.
          example: red
        icon:
          type: string
          description: Inline SVG markup for the tier's badge icon.
    Tag:
      type: object
      required:
        - id
        - owner
      properties:
        id:
          type: string
          description: An organizational unique technical identifier for this tag. Must be same as the path parameter.
          example: Governance/PII
        info:
          type: object
          description: Information of the tag
          properties:
            owner:
              type: string
              description: The owner of the tag (the ID of a team).
              example: checkout
            description:
              type: string
              description: "Clear and concise explanations related to the tag."
              example: "This tag is used to categorize an entity as pii."
        links:
          type: object
          description: Links associated with the tag.
          additionalProperties:
            type: string
          example:
            "Purview Data Map": "https://link1.com"
            "Azure SQL Explorer": "https://link2.com"
        properties:
          type: object
          description: Properties can be used to add additional information to the tag.
          additionalProperties: {
            type: string
          }

    Cost:
      type: object
      required:
        - dataProductId
        - name
        - amount
        - currency
      description: An expense of a data product.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: The unique identifier of the cost. Is automatically generated by the Entropy Data.
          example: 640864de-83d4-4619-afba-ccea8037ed3a
        dataProductId:
          type: string
          description: The identifier of the data product this cost is associated with.
          example: data-product-1
        name:
          type: string
          description: The name of the cost.
          example: AWS S3
        yearMonth:
          type: string
          format: year-month
          description: The year and month of the cost. Use this to report costs for a specific month. The format is YYYY-MM. Leave this empty if the cost is valid for every month.
          pattern: '^\d{4}-\d{2}$'
          example: 2023-01
        amount:
          type: number
          description: The amount of the cost.
          example: 1234.45
        currency:
          type: string
          description: The currency of the cost.
          example: USD
        estimated:
          type: boolean
          default: false
          description: Indicates if the cost is estimated. Use this to report costs for the current month that are not yet final.
          example: false
        category:
          type: string
          description: The category of the cost. Use this to group costs together.
          example: Data Platform
        description:
          type: string
          description: A description of the cost.
          example: Costs for the AWS S3 bucket
        tags:
          type: array
          description: Tags are used to categorize costs.
          items:
            type: string
            example: "aws"
        link:
          type: string
          format: uri
          description: A link to the cost report.
          example: https://example.com/link-to-aws-costexplorer

    Integration:
      type: object
      required:
        - externalId
        - name
        - source
        - enabled
      properties:
        externalId:
          type: string
          description: User-facing identifier, unique within an organization. The key used in all API paths and CLI commands.
          example: demo-snowflake
        name:
          type: string
          description: Human-readable display name.
          example: Demo Snowflake
        source:
          type: string
          enum: [snowflake, databricks, bigquery, postgres, mysql, mariadb, mssql, glue, alation, fabric, powerbi]
          description: The source platform this integration ingests from.
        enabled:
          type: boolean
          description: Whether the integration's schedule is enabled. Disabled integrations can still be run manually.
        assetOwnerTeamExternalId:
          type: string
          nullable: true
          description: External id of the team that owns ingested assets. Null for org-wide integrations.
        configuration:
          type: object
          additionalProperties: true
          nullable: true
          description: >-
            Decrypted, provider-specific configuration (credentials excluded). Returned only on the
            single-integration GET (`GET /api/integrations/{externalId}`); omitted from the list view.
    IngestionRun:
      type: object
      required:
        - ingestionRunId
        - integrationExternalId
        - status
        - assetsProcessed
        - assetsCreated
        - assetsUpdated
        - assetsDeleted
        - startedAt
      properties:
        ingestionRunId:
          type: string
          format: uuid
          description: >-
            The run's identity and path key at
            `/api/integrations/{externalId}/runs/{ingestionRunId}`. Runs have no external id of their own.
        integrationExternalId:
          type: string
          description: externalId of the integration this run belongs to.
          example: demo-snowflake
        status:
          type: string
          enum: [RUNNING, SUCCESS, FAILED, CANCELLED]
        message:
          type: string
          nullable: true
          description: Free-text status message; populated on completion and on some progress updates.
        assetsProcessed:
          type: integer
          format: int64
        assetsCreated:
          type: integer
          format: int64
        assetsUpdated:
          type: integer
          format: int64
        assetsDeleted:
          type: integer
          format: int64
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: Set when the run reaches a terminal status; null while running.
    TriggerRunResponse:
      type: object
      required:
        - integrationExternalId
        - scheduledAt
        - deferred
        - message
      properties:
        integrationExternalId:
          type: string
          description: externalId of the integration the run was scheduled for.
          example: demo-snowflake
        scheduledAt:
          type: string
          format: date-time
          description: Server-time at which the run was scheduled.
        deferred:
          type: boolean
          description: |
            True when the run will only be picked up on the next due-check cycle (~5 minutes)
            rather than starting immediately. Rare; happens when a manual task instance for this
            integration was already queued (e.g. recovered after a server restart).
        message:
          type: string
    IntegrationConflict:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          enum: [already_running]
        message:
          type: string
    Connector:
      type: object
      required:
        - id
        - info
      properties:
        id:
          type: string
          description: The identifier of the connector.
          example: connector-123
        info:
          type: object
          properties:
            type:
              type: string
              description: The type of the connector.
              example: databricks
            description:
              type: string
              description: A description of the connector.
              example: "This is a databricks connector."
            connectorVersion:
              type: string
              description: The version of the connector.
              example: "1.0.0"
        state:
          type: object
          additionalProperties: true
          description: The state of the connector.
          example:
            lastEventId: 95837f96-766f-4f8b-96f8-4f337f2a36a6
            lastHeartbeat: 2023-10-01T12:00:00Z
        custom:
          type: object
          additionalProperties: true
          description: Custom fields for the connector.

    ExampleData:
      type: object
      required:
        - id
        - dataProductId
      properties:
        id:
          type: string
          description: A unique identifier for this example data entry.
          example: order-service-orders
        dataProductId:
          type: string
          format: uuid
          description: The ID of the data product this example data belongs to.
        outputPortId:
          type: string
          format: uuid
          description: The ID of the output port this example data belongs to.
        dataContractId:
          type: string
          format: uuid
          description: The ID of the data contract this example data belongs to.
        schemaName:
          type: string
          description: The schema name to group example data entries.
          example: orders
        data:
          description: The example data. Can be a JSON object or a JSON array.

    TestResults:
      type: object
      required:
        - id
        - dataContractId
        - dataContractVersion
        - server
        - timestampStart
        - timestampEnd
        - result
      description: An expense of a data product.
      properties:
        id:
          type: string
          description: A unique identifier for the test run, e.g., a UUID.
          example: 466b4c17-8176-42f1-8199-59125dde5e61
        dataContractId:
          type: string
          description: The id of the data contract that was tested. A data contract with this ID must be available in the system.
          example: search-queries-all
        dataContractVersion:
          type: string
          description: The version of the data contract that was tested.
          example: 1.0.0
        server:
          type: string
          description: The server that was tested. A server with this key must be defined in the data contract in the system. If the data contract is linked to a output port of a data product, the server is defined by '${dataProductId}/${outputPortId}'.
          example: production
        timestampStart:
          type: string
          format: date-time
          example: 2024-07-03T10:46:28.195230Z
        timestampEnd:
          type: string
          format: date-time
          example: 2024-07-03T10:46:42.481447Z
        result:
          type: string
          description: The result of the test run.
          enum: [ passed, failed, warning, error, unknown ]
        checks:
          type: array
          items:
            type: object
            required:
              - type
              - result
            properties:
              type:
                type: string
                description: The type of the check, e.g. schema, quality
                example: schema
              name:
                type: string
                description: The name of the check, including the field or rule that was checked
                example: Check that field order_id is present
              result:
                type: string
                description: The result of the check
                enum: [ passed, failed, warning, error, unknown ]
                example: passed
              engine:
                type: string
                description: The engine that performed the check
                example: datacontract-cli
              model:
                type: string
                description: The model that was checked
                example: orders
              field:
                type: string
                description: The field that was checked
                example: order_id
              reason:
                type: string
                description: The reason for the result
                example: Field order_id is present
              details:
                type: string
                description: Additional details about the check
                example: Checked order_id
        logs:
          type: array
          description: Additional log output from the test run or the test engines
          items:
            type: object
            properties:
              level:
                type: string
                description: The log level, e.g. INFO, WARN, ERROR
                example: INFO
              message:
                type: string
                description: The log message
                example: "Running tests for data contract urn:datacontract:checkout:orders-latest with server production"
              timestamp:
                type: string
                format: date-time
                example: 2024-07-03T10:46:29.083871Z
    SemanticNamespace:
      type: object
      description: EXPERIMENTAL A semantic namespace groups a set of concepts and relationships.
      required:
        - name
      properties:
        namespace:
          type: string
          description: The unique namespace identifier within the organization. Must match the path parameter when both are provided.
          example: main
        name:
          type: string
          description: A human-readable name for the namespace.
          example: Main
        description:
          type: string
          description: A description of the namespace.
          example: The default namespace for the organization.
        read_only:
          type: boolean
          default: false
          description: When true, the namespace cannot be modified through the UI. API edits are still possible.
          example: false
        team:
          type: string
          description: The owning team's external id. The caller must have edit permission on the team to set this.
          example: checkout
    SemanticConcept:
      type: object
      description: |
        EXPERIMENTAL A semantic concept. Concepts can be entities, properties, shared properties, metrics, or groups (selected via `kind`).
        Field availability depends on `kind`: property fields (`data_type`, `required`, `unique`, `business_name`, `examples`, `enum`, `pattern`) only apply to `property` and `shared_property`; metric fields (`unit`, `better_when`, `formula`) only apply to `metric`; `properties` only applies to `entity`.
      required:
        - name
      properties:
        id:
          type: string
          description: An organizational unique technical identifier for this concept within the namespace. Must match the path parameter when both are provided. Can contain "/".
          example: customer
        name:
          type: string
          description: A human-readable name for the concept.
          example: Customer
        kind:
          type: string
          enum:
            - entity
            - shared_property
            - property
            - metric
            - group
          default: entity
          description: The kind of concept.
          example: entity
        description:
          type: string
          description: A description of the concept.
        iri:
          type: string
          description: An optional IRI identifying the concept (typically used to link to an external ontology).
        status:
          type: string
          description: A free-form lifecycle status for this concept (e.g., draft, active, deprecated).
          example: active
        group:
          type: string
          description: The external id of a `group` concept that this concept belongs to.
        team:
          type: string
          description: The owning team's external id. The caller must have edit permission on the team to set this.
          example: checkout
        domain:
          type: string
          description: An optional domain identifier.
        classification:
          type: string
          description: An optional data classification (e.g., internal, confidential, pii).
        tags:
          type: array
          items:
            type: string
          example:
            - core
        ai_context:
          type: object
          description: A free-form map of context hints used by AI features.
          additionalProperties: true
        custom_properties:
          type: object
          description: >-
            OSI open escape hatch (PR #146). A free-form map for data not covered by the core spec —
            IRIs, owl:equivalentClass, provenance — and language-tagged literals via the `name@lang`
            key convention (e.g. `name@de`, `description@fr`). Accepts the prior `custom_fields` name.
          additionalProperties: true
        data_type:
          type: string
          description: Property-only. The data type of the property (e.g., string, integer, boolean).
          example: string
        required:
          type: boolean
          description: Property-only. Whether the property is required.
        unique:
          type: boolean
          description: Property-only. Whether the property is unique.
        business_name:
          type: string
          description: Property-only. A business-friendly name for the property.
        examples:
          type: array
          items:
            type: string
          description: Property-only. Example values for the property.
        enum:
          type: array
          items:
            type: string
          description: Property-only. The set of allowed values for the property.
        pattern:
          type: string
          description: Property-only. A regular expression that values of the property must match.
        unit:
          type: string
          description: Metric-only. The unit of the metric (e.g., USD, count, percent).
        better_when:
          type: string
          description: Metric-only. A hint about whether higher or lower values are better (e.g., higher, lower).
        formula:
          type: string
          description: Metric-only. The formula used to compute the metric.
        properties:
          type: array
          description: |
            Entity-only. The list of properties for an entity. Each entry is either an inline property definition (a SemanticConcept with `kind: property`) or a shared-property reference of the form `{ "ref": "<externalId>" }`. Sending `null` preserves existing properties; sending an empty list removes them all.
          items:
            oneOf:
              - $ref: '#/components/schemas/SemanticConcept'
              - type: object
                required:
                  - ref
                properties:
                  ref:
                    type: string
                    description: The external id of a shared property in the same namespace.
                    example: email
    SemanticRelationshipRole:
      type: object
      description: One side of a relationship — references a concept by external id, optionally in a different namespace.
      required:
        - concept
      properties:
        concept:
          type: string
          description: The external id of the referenced concept. May contain "/".
          example: customer
        namespace:
          type: string
          description: The namespace of the referenced concept. Defaults to the relationship's namespace when omitted.
          example: main
        role_name:
          type: string
          description: An optional role name for this side of the relationship.
        custom_properties:
          type: object
          description: >-
            OSI open escape hatch (PR #146). A free-form map for foreign role data (e.g. `rdfs:range`).
            Only the to-side (second) role's custom_properties are persisted; the from-side is implicit.
          additionalProperties: true
    SemanticRelationship:
      type: object
      description: EXPERIMENTAL A binary relationship between two concepts. Only binary relationships (exactly two `roles` entries) are supported in v0.
      required:
        - type
      properties:
        id:
          type: string
          description: An organizational unique technical identifier for this relationship within the namespace. Must match the path parameter when both are provided.
          example: customer-has-orders
        name:
          type: string
          description: A human-readable name for the relationship.
        description:
          type: string
          description: A description of the relationship.
        type:
          type: string
          description: The relationship type, e.g. `hasProperty`, `isA`, `relatedTo`, `memberOf`.
          example: relatedTo
        roles:
          type: array
          minItems: 2
          maxItems: 2
          description: Exactly two roles — the from-side and the to-side of the relationship.
          items:
            $ref: '#/components/schemas/SemanticRelationshipRole'
        multiplicity:
          type: string
          description: An optional multiplicity hint (e.g., `OneToOne`, `OneToMany`, `ManyToOne`, `ManyToMany`).
          example: ManyToOne
        verbalizes:
          type: array
          items:
            type: string
          description: >-
            OSI natural-language patterns that verbalize the relationship's links. Optional on input;
            auto-generated from the name and roles on export when omitted.
          example:
            - "{Customer} places {Order}"
        custom_properties:
          type: object
          description: >-
            OSI open escape hatch (PR #146). A free-form map for foreign relationship data
            (IRIs, `owl:inverseOf`, …) not covered by the core spec.
          additionalProperties: true
    OtelTracesRequest:
      type: object
      description: OpenTelemetry trace data in OTLP/JSON format for tracking data product usage and query activity.
      properties:
        resourceSpans:
          type: array
          description: Array of resource spans, each containing trace data grouped by resource attributes.
          items:
            type: object
            properties:
              resource:
                type: object
                description: Resource attributes that apply to all spans in this group.
                properties:
                  attributes:
                    type: array
                    description: Key-value attributes describing the resource (service, data product, output port).
                    items:
                      $ref: '#/components/schemas/OtlpAttribute'
              scopeSpans:
                type: array
                description: Array of scope spans, each containing spans grouped by instrumentation scope.
                items:
                  type: object
                  properties:
                    scope:
                      type: object
                      description: Instrumentation scope information.
                      properties:
                        name:
                          type: string
                          description: Name of the instrumentation scope.
                          example: usage
                        version:
                          type: string
                          description: Version of the instrumentation scope.
                          example: 1.0.0
                    spans:
                      type: array
                      description: Array of spans representing individual operations or queries.
                      items:
                        $ref: '#/components/schemas/OtlpSpan'
    OtlpSpan:
      type: object
      description: An OpenTelemetry span representing a single operation or query.
      properties:
        traceId:
          type: string
          description: Unique identifier for the trace.
          example: trace001
        spanId:
          type: string
          description: Unique identifier for the span within the organization. Used for upsert operations.
          example: span001
        name:
          type: string
          description: Optional human-readable name for the span.
          example: Query execution
        kind:
          type: string
          description: The kind of span (e.g., SPAN_KIND_INTERNAL, SPAN_KIND_CLIENT).
          example: SPAN_KIND_INTERNAL
        startTimeUnixNano:
          type: integer
          format: int64
          description: Start time of the span in Unix nanoseconds.
          example: 1704067200000000000
        endTimeUnixNano:
          type: integer
          format: int64
          description: End time of the span in Unix nanoseconds.
          example: 1704067260000000000
        attributes:
          type: array
          description: Span attributes containing query details (user, role, type, query, rows, result, access.id).
          items:
            $ref: '#/components/schemas/OtlpAttribute'
    OtlpAttribute:
      type: object
      description: A key-value attribute in OpenTelemetry format.
      properties:
        key:
          type: string
          description: The attribute key.
          example: user
        value:
          type: object
          description: The attribute value, which can be a string, int, double, bool, or array.
          properties:
            stringValue:
              type: string
              description: String value.
              example: ANALYTICS_TEAM
            intValue:
              type: integer
              format: int64
              description: Integer value.
              example: 1523
            doubleValue:
              type: number
              format: double
              description: Double value.
            boolValue:
              type: boolean
              description: Boolean value.
            arrayValue:
              type: object
              description: Array value containing multiple values.
              properties:
                values:
                  type: array
                  items:
                    $ref: '#/components/schemas/OtlpAttribute'
    OpenLineageRunEvent:
      type: object
      description: An OpenLineage RunEvent representing a lifecycle event for a data pipeline run.
      properties:
        eventType:
          type: string
          description: The type of lifecycle event.
          enum: [START, RUNNING, COMPLETE, ABORT, FAIL]
          example: COMPLETE
        eventTime:
          type: string
          format: date-time
          description: The time the event occurred in ISO 8601 format.
          example: "2024-01-15T10:00:00.000Z"
        run:
          type: object
          description: Information about the run.
          properties:
            runId:
              type: string
              description: Unique identifier for this run.
              example: "d46e465b-d358-4d32-83d4-df660ff614dd"
            facets:
              type: object
              description: |
                Run facets containing additional metadata. Supports standard OpenLineage facets
                and the custom `entropy_data` facet for linking runs to data products.
              additionalProperties: true
              properties:
                entropy_data:
                  $ref: '#/components/schemas/EntropyDataRunFacet'
        job:
          type: object
          description: Information about the job.
          properties:
            namespace:
              type: string
              description: The namespace of the job (e.g., dbt, airflow, spark).
              example: dbt
            name:
              type: string
              description: The name of the job.
              example: my_model
            facets:
              type: object
              description: Job facets containing additional metadata.
              additionalProperties: true
        inputs:
          type: array
          description: Input datasets consumed by this job.
          items:
            $ref: '#/components/schemas/OpenLineageDataset'
        outputs:
          type: array
          description: Output datasets produced by this job.
          items:
            $ref: '#/components/schemas/OpenLineageDataset'
        producer:
          type: string
          description: URI identifying the producer of this event.
          example: "https://github.com/OpenLineage/OpenLineage/tree/0.18.0/integration/dbt"
        schemaURL:
          type: string
          description: URI of the OpenLineage schema for this event.
          example: "https://openlineage.io/spec/2-0-2/OpenLineage.json#/definitions/RunEvent"
      required:
        - eventType
    OpenLineageDataset:
      type: object
      description: An OpenLineage dataset representing an input or output of a job.
      properties:
        namespace:
          type: string
          description: The namespace of the dataset.
          example: "snowflake://account.snowflakecomputing.com"
        name:
          type: string
          description: The name of the dataset.
          example: "analytics_db.public.orders"
        facets:
          type: object
          description: |
            Dataset facets containing additional metadata (schema, data quality, etc.).
            Supports the custom `entropy_data` facet for linking datasets to assets.
          additionalProperties: true
          properties:
            entropy_data:
              $ref: '#/components/schemas/EntropyDataDatasetFacet'
    EntropyDataRunFacet:
      type: object
      description: |
        Custom OpenLineage run facet that links a pipeline run to an Entropy Data data product
        and output port. When present in `run.facets.entropy_data`, the controller uses it as
        a fallback when `dataProductId`/`outputPortName` query parameters are not provided.
      properties:
        _producer:
          type: string
          example: "https://entropy-data.com"
        _schemaURL:
          type: string
          example: "https://entropy-data.com/spec/facets/1-0-0/EntropyDataRunFacet.json"
        dataProductId:
          type: string
          description: The external ID of the data product.
          example: orders
        outputPortName:
          type: string
          description: The external ID of the output port.
          example: snowflake_orders_v2
    EntropyDataDatasetFacet:
      type: object
      description: |
        Custom OpenLineage dataset facet that links an input or output dataset to an
        Entropy Data asset by its external ID.
      properties:
        _producer:
          type: string
          example: "https://entropy-data.com"
        _schemaURL:
          type: string
          example: "https://entropy-data.com/spec/facets/1-0-0/EntropyDataDatasetFacet.json"
        assetId:
          type: string
          description: The external ID of the asset in Entropy Data.
          example: raw-orders
    TeamRolesSettings:
      type: object
      description: >-
        An organization's team roles configuration: the mode plus, when custom,
        the role catalog.
      required:
        - mode
      properties:
        mode:
          type: string
          description: >-
            `default` derives team permissions from the built-in default roles;
            `custom-team-roles` derives them from the organization's custom role
            catalog (`team-roles`).
          enum:
            - default
            - custom-team-roles
          example: custom-team-roles
        team-roles:
          type: array
          description: >-
            The custom team role catalog. Returned (and required) only when
            `mode` is `custom-team-roles`; a `PUT` replaces the entire catalog
            with these roles, matched by `name`.
          items:
            $ref: '#/components/schemas/TeamRole'
    TeamRole:
      type: object
      description: >-
        A custom team role. The `name` is the external identifier and is what
        gets stored on each team member's `role` field.
      required:
        - name
        - permissions
      properties:
        name:
          type: string
          description: The display name of the role. Acts as the external identifier. 3–1000 characters.
          minLength: 3
          maxLength: 1000
          example: Approver
        description:
          type: string
          nullable: true
          description: Optional human-readable description of the role.
          example: Can approve access requests and manage their team's resources.
        rank:
          type: integer
          nullable: true
          description: Display order — lower ranks appear first. Defaults to the role's position in the list.
          example: 100
        permissions:
          type: array
          description: The set of team permissions this role grants.
          items:
            type: string
            enum:
              - RESOURCES_ADD
              - RESOURCES_EDIT
              - RESOURCES_DELETE
              - CHANGE_REQUEST_SUBMIT
              - CHANGE_REQUEST_APPROVE
              - ACCESS_ADD
              - ACCESS_EDIT
              - ACCESS_DELETE
              - ACCESS_REQUEST
              - ACCESS_APPROVE
              - ACCESS_TERMINATE
              - TEAM_ADD
              - TEAM_EDIT
              - TEAM_DELETE
              - TEAM_MEMBER_ADD
              - TEAM_MEMBER_EDIT
              - TEAM_MEMBER_DELETE
              - INGESTION_EDIT
          example:
            - RESOURCES_ADD
            - RESOURCES_EDIT
            - ACCESS_APPROVE
    OrganizationMember:
      type: object
      description: An organization user
      properties:
        emailAddress:
          type: string
          description: The email address of the user
          example: mail@example.com
          readOnly: true
        userId:
          type: string
          description: An internal unique identifier for the user. Typically starts with u.
          example: u466b4c17a345e61
          readOnly: true
        role:
          type: string
          description: The role of the user of the organization.
          example: Member
          enum:
            - Member
            - Owner
        custom:
          type: object
          description: Custom fields can be used to add additional information to the user.
          additionalProperties: {
            type: string
          }
