openapi: 3.1.1
info:
  description: |
    The [Entropy Data](https://www.entropy-data.com) API allows you to integrate with your data platform.
    
    You can manage data products, data usage agreements, data contracts, and teams. You can also approve, reject, or cancel data usage agreements. 
    
    You can observe any changes to data products, data usage agreements, data contracts, and teams via events by polling an [HTTP Feed](https://www.http-feeds.org/). 
    
    You need an API key for every operation. You can generate the API key within the UI in the organization settings.

    ## Pagination

    List endpoints return paginated results. Use the `p` query parameter (0-indexed) to request a specific page. The response body is a plain JSON array — there is no wrapper object.

    Pagination metadata is provided via the HTTP `Link` header with `rel="next"` ([RFC 5988](https://tools.ietf.org/html/rfc5988)). If a `Link` header with `rel="next"` is present, there are more results available on the next page. If it is absent, you have reached the last page.

    **Tip:** Use `curl -i` or check response headers in your HTTP client to see the `Link` header.
  version: 0.0.3
  title: REST-API
  contact:
    name: support
    email: support@entropy-data.com
  termsOfService: https://entropy-data.com/terms-of-service
externalDocs:
  description: Documentation
  url: https://docs.entropy-data.com
servers:
  - url: https://api.entropy-data.com
  - url: https://localhost:8080
tags:
  - name: Data Products
    description: Data Products implement Data Contracts. They provide the actual data via output ports, and link to source systems via input ports.
  - name: Data Contracts
    description: >
      Data Contracts are the API for Data. An output port can implement a data contract. A data contract can be implemented by multiple output ports.
      Entropy Data uses the [Open Data Contract Standard (ODCS)](https://bitol-io.github.io/open-data-contract-standard/) as its primary format.
      The [Data Contract Specification (DCS)](https://datacontract-specification.com) is still supported but deprecated and will be removed after 2026-12-31. We recommend migrating existing DCS contracts to ODCS.
    externalDocs:
      description: Open Data Contract Standard (ODCS)
      url: https://bitol-io.github.io/open-data-contract-standard/
  - name: Access
    description: Access (formerly known as "Data Usage Agreements") represents the edges in the graph. They connect a consuming data product with an output port of a providing data product. When active, the consumer should be able to access the data.
  - name: Source Systems
    description: Source Systems are the systems that provide data to the data products. They are connected to the data products via input ports.
  - name: Teams
    description: Teams are the organizational unit in the Entropy Data. They own data products, source systems, data contracts, and definitions.
  - name: Notification Channels
    description: Team-scoped notification channels for receiving alerts about data platform events. Each team can configure channels for different event types.
  - name: Definitions
    description: Definitions specify a reusable business or technical term, including its type, description, examples, and classifications. Definitions can be referenced from within Data Contracts.
  - name: Schemas
    description: >-
      JSON Schemas that data contracts (ODCS) and data products (ODPS) validate against.
      Each specification is available as the pristine base standard (`odcs.schema.json`) and as the
      organization's custom variant (`odcs-custom.schema.json`), which layers the constraints from
      the organization's customization onto the base schema via `allOf`. The custom variant is the
      schema the data contract editor validates against; use it to validate documents before
      submitting them via the API.
  - name: Assets
    description: EXPERIMENTAL A data asset refers to any data-related resource or entity that can be managed and tracked within the system, such as a database table, file, or data pipeline.
  - name: Certifications
    description: Certifications define quality levels that can be assigned to data products. They are organization-level governance constructs.
  - name: Classifications
    description: Classification schemes define sensitivity tiers (e.g. Public, Internal, Sensitive) that can be assigned to data products, data contracts, and semantic concepts. An organization can define one or more schemes; each is addressed by its stable externalId and carries its tiers inline.
  - name: Tags
    description: Tags can be applied to data products, data contracts or assets and are unique.
  - name: Policies
    description: EXPERIMENTAL Manage the policies of your data mesh. Policies are the rules of play of the data mesh.
  - name: Costs
    description: EXPERIMENTAL Expenses of data products, e.g., storage, compute, maintenance, and data transfer costs. The expenses can be automatically extracted from cloud provider billing APIs via our integrations.
  - name: Usage
    description: EXPERIMENTAL Usage information data product usage and query activity. Submit traces via OpenTelemetry/JSON format to monitor queries, consumers, and access patterns.
  - name: Lineage
    description: EXPERIMENTAL OpenLineage event ingestion. Compatible with dbt-ol, Airflow, Spark, and other OpenLineage producers. Set OPENLINEAGE_URL to your Entropy Data instance.
  - name: SCIM
    description: System for Cross-domain Identity Management (SCIM) endpoints for user and group provisioning and management.
  - name: Integrations
    description: Native integrations that ingest assets from external data platforms (Snowflake, Databricks, BigQuery, Postgres, MySQL, MariaDB, MSSQL, Glue, Alation, Fabric, Power BI). List configured integrations, inspect their provider-specific configuration as YAML, view past ingestion runs, and trigger or cancel a manual run.
  - name: Connectors
    description: EXPERIMENTAL Used by SDK and connectors. Use this API to store state (such as the lastEventId) and update health information.
  - name: Example Data
    description: EXPERIMENTAL Sample data for data products to preview what the data looks like.
  - name: Test Results
    description: EXPERIMENTAL Results of test runs of a data contract against a server (e.g., output port of a data product). The test runs van be executed using the Data Contract CLI tool.
  - name: Semantics
    description: EXPERIMENTAL Manage semantic namespaces, concepts (entities, properties, shared properties, metrics, groups), and relationships. Paths live under `/api/semantics/experimental/` to signal that the shape may change without backwards-compatibility guarantees while the semantics subsystem stabilizes. Payloads follow the semantics YAML schema so clients can map between JSON and YAML representations with minimal translation.
  - name: Events
    description: Events are emitted when one of the core resource are created, updated, or deleted. There may be additional events like special state changes, as well.
  - name: Team Git Credentials
    description: Git credentials scoped to a team for authenticating with Git repositories.
    externalDocs:
      description: Credential Resolution Hierarchy
      url: https://docs.entropy-data.com/howto/git-integration#credential-resolution-hierarchy
  - name: Organization Git Credentials
    description: Git credentials scoped to the organization for authenticating with Git repositories.
    externalDocs:
      description: Credential Resolution Hierarchy
      url: https://docs.entropy-data.com/howto/git-integration#credential-resolution-hierarchy
  - name: Organization
    description: Organization and its members.
  - name: Team Roles
    description: >-
      Configure how team permissions are derived: from the built-in default
      roles (Owner, Approver, Editor, Member, Steward) or from a custom role
      catalog you define. The `/api/settings/team-roles` endpoint reads and sets
      the mode and, when custom, the catalog in one aggregate payload.
  - name: API Keys
    description: Manage API keys for programmatic access. Only team-scoped API keys can be created and deleted via this API.
paths:
  /api/dataproducts:
    get:
      tags:
        - Data Products
      summary: Get all data products
      description: Get all data products of an organization. For performance reasons, this endpoint may return only top-level properties of the data products. Use the GET /api/dataproducts/{id} endpoint to get all details.
      operationId: getDataProducts
      parameters:
        - in: query
          name: q
          schema:
            type: string
          required: false
          example: my-dataproduct
          description: Search term to filter data products. Searches in the id, title, and description. Multiple search terms are supported, separated by space.
        - in: query
          name: teamId
          schema:
            type: string
          required: false
          example: my-team
          description: Filter for data products owned by specific teams. Repeat the parameter to filter by multiple teams.
        - in: query
          name: domainId
          schema:
            type: string
          required: false
          example: sales
          description: Filter for data products in specific domains. Repeat the parameter to filter by multiple domains.
        - in: query
          name: archetype
          schema:
            type: string
          required: false
          example: application
          description: Filter for specific types.
        - in: query
          name: status
          schema:
            type: string
          example: active
          required: false
          description: Filter for specific status.
        - in: query
          name: tag
          schema:
            type: string
          required: false
          description: Filter for specific tags.
        - in: query
          name: sort
          schema:
            type: string
          example: name
          required: false
          description: Field to sort by, default is creation date.
        - in: query
          name: p
          schema:
            type: integer
            minimum: 0
          example: 0
          required: false
          description: The number of the requested page, starting from 0. Each page contains a maximum of 1000 data products, sorted by creation date ascending. Use the Link header with rel="next" to navigate to the next page.
      responses:
        200:
          description: List of data products. This endpoints supports [Open Data Product Standard](https://github.com/bitol-io/open-data-product-standard) or [Data Product Specification](https://dataproduct-specification.com) payloads. You find both formats in the schemas below.. Explore the examples and schema specifications for differences between the two formats. When using the SDK you have to handle parsing into the correct schema object by yourself. We recommend using the "kind" property in ODPS and/or the "dataProductSpecification" property in DPS to detect the current payload.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: See endpoint
              example: [
                {
                  "apiVersion": "v1.0.0",
                  "kind": "DataProduct",
                  "id": "shelf-warmers",
                  "name": "Shelf Warmers",
                  "status": "active",
                  "authoritativeDefinitions": [ ],
                  "description": {
                    "purpose": "A list of articles with no sales in last 6 months"
                  },
                  "customProperties": [
                    {
                      "property": "platformRole",
                      "value": "dp_shelf_warmers_role"
                    }
                  ],
                  "tags": [
                    "demo"
                  ],
                  "inputPorts": [ ],
                  "outputPorts": [
                    {
                      "name": "shelf-warmers-v1",
                      "version": "",
                      "description": "A list of articles with no sales in last 6 months",
                      "type": "snowflake",
                      "contractId": "ec9c94cd-6126-4fed-96aa-36df336aed0d",
                      "authoritativeDefinitions": [
                        {
                          "type": "Snowflake WebUI",
                          "url": "https://example.com"
                        }
                      ],
                      "customProperties": [
                        {
                          "property": "platformRole",
                          "value": "op_shelf_warmers_v1_role"
                        },
                        {
                          "property": "status",
                          "value": "active"
                        },
                        {
                          "property": "autoApprove",
                          "value": true
                        },
                        {
                          "property": "containsPii",
                          "value": false
                        },
                        {
                          "property": "server",
                          "value": {
                            "schema": "SHELF_WARMERS",
                            "account": "lmtrwxs-xn14859",
                            "database": "FULFILLMENT_DB"
                          }
                        },
                        {
                          "property": "environment",
                          "value": "prod"
                        }
                      ],
                      "tags": [ ]
                    },
                    {
                      "name": "s3_fulfillment_shelf_warmers",
                      "version": "",
                      "description": "A list of articles with no sales in last 6 months",
                      "type": "s3",
                      "contractId": "ec9c94cd-6126-4fed-96aa-36df336aed0d",
                      "authoritativeDefinitions": [
                        {
                          "type": "AWS Console",
                          "url": "https://example.com"
                        }
                      ],
                      "customProperties": [
                        {
                          "property": "platformRole",
                          "value": "op_shelf_warmers_s3_fulfillment_shelf_warmers_role"
                        },
                        {
                          "property": "status",
                          "value": "active"
                        },
                        {
                          "property": "autoApprove",
                          "value": true
                        },
                        {
                          "property": "containsPii",
                          "value": false
                        },
                        {
                          "property": "server",
                          "value": {
                            "location": "s3://my-bucket"
                          }
                        },
                        {
                          "property": "environment",
                          "value": "prod"
                        }
                      ],
                      "tags": [ ]
                    }
                  ],
                  "managementPorts": [ ],
                  "team": {
                    "name": "fulfillment"
                  }
                },
                {
                  "dataProductSpecification": "0.0.1",
                  "id": "shelf-warmers",
                  "info": {
                    "title": "Shelf Warmers",
                    "description": "A list of articles with no sales in last 6 months",
                    "owner": "fulfillment",
                    "status": "active",
                    "archetype": "consumer-aligned"
                  },
                  "inputPorts": [ ],
                  "outputPorts": [
                    {
                      "id": "shelf-warmers-v1",
                      "name": "Shelf Warmers",
                      "description": "A list of articles with no sales in last 6 months",
                      "type": "snowflake",
                      "environment": "prod",
                      "server": {
                        "schema": "SHELF_WARMERS",
                        "account": "lmtrwxs-xn14859",
                        "database": "FULFILLMENT_DB"
                      },
                      "status": "active",
                      "autoApprove": false,
                      "containsPii": false,
                      "dataContractId": "shelf-warmers-v1",
                      "tags": [ ],
                      "links": {
                        "Snowflake WebUI": "https://example.com"
                      },
                      "custom": {
                        "platformRole": "op_shelf_warmers_v1_role"
                      },
                      "assets": [ ]
                    }
                  ],
                  "tags": [
                    "demo"
                  ],
                  "links": { },
                  "custom": {
                    "platformRole": "dp_shelf_warmers_role"
                  },
                  "assets": [ ]
                }
              ]
  /api/dataproducts/{id}:
    parameters:
      - name: id
        in: path
        description: An organizational unique technical identifier for this data product, such as an UUID, URN, string, number. Format must be a valid path parameter for GET and DELETE requests, so no URI or '/' allowed.
        required: true
        schema:
          type: string
    put:
      tags:
        - Data Products
      summary: Add or update a data product
      description: Add a new data product or update an existing data product. Usually, the CI/CD pipeline of your data product calls this operation during its deployment. This endpoints supports [Open Data Product Standard](https://github.com/bitol-io/open-data-product-standard) or [Data Product Specification](https://dataproduct-specification.com) payloads. You find both formats in the schemas below.. Explore the examples and schema specifications for differences between the two formats. When using the SDK you have to handle parsing into the correct schema object by yourself. We recommend using the "kind" property in ODPS and/or the "dataProductSpecification" property in DPS to detect the current payload.
      operationId: addDataProduct
      responses:
        200:
          description: data product successfully registered or updated
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: data product cannot be updated due to invalid data
      requestBody:
        required: true
        content:
          'application/json':
            schema:
              type: object
            examples:
              dataproductspecification:
                $ref: "#/components/examples/dataproductspecification"
              opendataproductstandard:
                $ref: "#/components/examples/opendataproductstandard"
    get:
      parameters:
        - name: id
          in: path
          description: An organizational unique technical identifier for this data product, such as an UUID, URN, string, number. Format must be a valid path parameter for GET and DELETE requests, so no URI or '/' allowed.
          required: true
          schema:
            type: string
      tags:
        - Data Products
      summary: Get a data product
      description: Get a data product by its ID. The data product contains all its output ports. This endpoints supports [Open Data Product Standard](https://github.com/bitol-io/open-data-product-standard) or [Data Product Specification](https://dataproduct-specification.com) payloads. You find both formats in the schemas below.. Explore the examples and schema specifications for differences between the two formats. When using the SDK you have to handle parsing into the correct schema object by yourself. We recommend using the "kind" property in ODPS and/or the "dataProductSpecification" property in DPS to detect the current payload.
      operationId: getDataProduct
      responses:
        200:
          description: The data product
          content:
            'application/json':
              schema:
                type: object
              examples:
                dataproductspecification:
                  $ref: "#/components/examples/dataproductspecification"
                opendataproductstandard:
                  $ref: "#/components/examples/opendataproductstandard"
        404:
          $ref: "#/components/responses/NotFound"
          description: Data product not found
    delete:
      summary: Delete a data product
      operationId: deleteDataProduct
      description: Deletes a data product by its ID. The data product must not be used in an active access.
      tags:
        - Data Products
      responses:
        200:
          description: Data product was deleted
        404:
          $ref: "#/components/responses/NotFound"
          description: Data product not found
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: data product cannot be deleted, e.g. when it is still used in an active access.
  /api/dataproducts/{id}/star:
    parameters:
      - name: id
        in: path
        description: The externalId of the data product.
        required: true
        schema:
          type: string
    get:
      tags:
        - Data Products
      summary: Get the star status of a data product
      description: Returns the total number of stars across the organization and whether the calling user has starred it. `starredByMe` is only meaningful for user-scoped API keys; it is `false` for organization- and team-scoped keys.
      operationId: getDataProductStar
      responses:
        200:
          description: The star status.
          content:
            'application/json':
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    description: Total number of stars across the organization.
                  starredByMe:
                    type: boolean
                    description: Whether the calling user has starred this data product.
                required:
                  - count
                  - starredByMe
        404:
          $ref: "#/components/responses/NotFound"
          description: Data product not found
    put:
      tags:
        - Data Products
      summary: Star a data product
      description: Star a data product as the calling user. Idempotent — starring an already-starred product returns 204. Requires a user-scoped API key, because a star belongs to a user; organization- and team-scoped keys are rejected.
      operationId: starDataProduct
      responses:
        204:
          description: The data product is starred by the calling user.
        403:
          $ref: "#/components/responses/Forbidden"
          description: The API key is not user-scoped.
        404:
          $ref: "#/components/responses/NotFound"
          description: Data product not found
    delete:
      tags:
        - Data Products
      summary: Unstar a data product
      description: Remove the calling user's star from a data product. Idempotent — unstarring a product that is not starred returns 204. Requires a user-scoped API key.
      operationId: unstarDataProduct
      responses:
        204:
          description: The calling user's star was removed (or was already absent).
        403:
          $ref: "#/components/responses/Forbidden"
          description: The API key is not user-scoped.
        404:
          $ref: "#/components/responses/NotFound"
          description: Data product not found
  /api/dataproducts/{id}/stargazers:
    parameters:
      - name: id
        in: path
        description: The externalId of the data product.
        required: true
        schema:
          type: string
    get:
      tags:
        - Data Products
      summary: List the stargazers of a data product
      description: List the users who have starred a data product, newest star first. Restricted to organization owners.
      operationId: getDataProductStargazers
      responses:
        200:
          description: The users who starred the data product.
          content:
            'application/json':
              schema:
                type: array
                items:
                  type: object
                  properties:
                    userId:
                      type: string
                    fullName:
                      type: string
                      nullable: true
                  required:
                    - userId
        403:
          $ref: "#/components/responses/Forbidden"
          description: Only organization owners may list stargazers.
        404:
          $ref: "#/components/responses/NotFound"
          description: Data product not found
  /api/dataproducts/import/git:
    post:
      tags:
        - Data Products
      summary: Import a data product from a Git repository
      description: |
        Fetches a YAML file from a Git repository, creates or updates a data product, and establishes a Git connection.
        Credentials are resolved either explicitly via `gitCredentialExternalId` or implicitly via `gitConnectionType`/`host` matching through the credential hierarchy.
      operationId: importDataProductFromGit
      requestBody:
        required: true
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/GitImportRequest'
      responses:
        201:
          description: Data product created and git connection established
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/GitConnectionResponse'
        404:
          $ref: "#/components/responses/NotFound"
          description: Credential with the specified `gitCredentialExternalId` not found
        409:
          $ref: "#/components/responses/Conflict"
          description: File is already connected to a data product
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: No git credentials found or invalid YAML
        502:
          $ref: "#/components/responses/BadGateway"
          description: Error communicating with the Git provider
  /api/dataproducts/{id}/gitconnection:
    parameters:
      - name: id
        in: path
        description: The data product ID.
        required: true
        schema:
          type: string
    get:
      tags:
        - Data Products
      summary: Get the git connection of a data product
      description: Returns the git connection details including sync status and web link.
      operationId: getDataProductGitConnection
      responses:
        200:
          description: Git connection details
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/GitConnectionResponse'
        404:
          $ref: "#/components/responses/NotFound"
          description: Data product or git connection not found
    put:
      tags:
        - Data Products
      summary: Create or update a git connection for a data product
      description: |
        Creates or updates the git connection for a data product.
        Credentials are resolved either explicitly via `gitCredentialExternalId` or implicitly via `gitConnectionType`/`host` matching through the credential hierarchy.
      operationId: putDataProductGitConnection
      requestBody:
        required: true
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/GitConnectionRequest'
      responses:
        200:
          description: Git connection created or updated
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/GitConnectionResponse'
        404:
          $ref: "#/components/responses/NotFound"
          description: Credential with the specified `gitCredentialExternalId` not found
        409:
          $ref: "#/components/responses/Conflict"
          description: File is already connected to another data product
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: No git credentials found
    delete:
      tags:
        - Data Products
      summary: Delete the git connection of a data product
      description: Removes the git connection. The data product itself is not affected.
      operationId: deleteDataProductGitConnection
      responses:
        200:
          description: Git connection deleted
        404:
          $ref: "#/components/responses/NotFound"
          description: Data product not found
  /api/dataproducts/{id}/gitconnection/pull:
    parameters:
      - name: id
        in: path
        description: The data product ID.
        required: true
        schema:
          type: string
    post:
      tags:
        - Data Products
      summary: Pull data product from Git
      description: Fetches the latest version of the YAML file from the Git repository and updates the data product.
      operationId: pullDataProductFromGit
      responses:
        200:
          description: Data product updated from Git
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/GitConnectionResponse'
        404:
          $ref: "#/components/responses/NotFound"
          description: Data product or git connection not found
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: Git setting not found, uses user-level auth, or invalid YAML
        502:
          $ref: "#/components/responses/BadGateway"
          description: Error communicating with the Git provider
  /api/dataproducts/{id}/gitconnection/push:
    parameters:
      - name: id
        in: path
        description: The data product ID.
        required: true
        schema:
          type: string
    post:
      tags:
        - Data Products
      summary: Push data product to Git
      description: Pushes the current data product YAML to the connected Git repository.
      operationId: pushDataProductToGit
      requestBody:
        required: false
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/GitPushRequest'
      responses:
        200:
          description: Data product pushed to Git
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/GitConnectionResponse'
        404:
          $ref: "#/components/responses/NotFound"
          description: Data product or git connection not found
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: Git setting not found, uses user-level auth, or no YAML content
        502:
          $ref: "#/components/responses/BadGateway"
          description: Error communicating with the Git provider
  /api/dataproducts/{id}/gitconnection/push-pr:
    parameters:
      - name: id
        in: path
        description: The data product ID.
        required: true
        schema:
          type: string
    post:
      tags:
        - Data Products
      summary: Push data product to Git as a pull request
      description: |
        Creates a new branch, commits the current data product YAML, and opens a pull request
        targeting the original branch. Supports GitHub, GitLab, Bitbucket, and Azure DevOps.
        For GitLab, a merge request is created instead of a pull request.
        All parameters are optional and have sensible defaults from the git connection settings.
      operationId: pushDataProductToGitAsPullRequest
      requestBody:
        required: false
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/GitPullRequestRequest'
      responses:
        200:
          description: Pull request created
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/GitConnectionResponse'
        404:
          $ref: "#/components/responses/NotFound"
          description: Data product or git connection not found
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: Git setting not found, uses user-level auth, or no YAML content
        502:
          $ref: "#/components/responses/BadGateway"
          description: Error communicating with the Git provider
