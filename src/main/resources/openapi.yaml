          description: dataProductId is required
    delete:
      tags:
        - Example Data
      summary: Delete example data
      operationId: deleteExampleData
      responses:
        200:
          description: Example data deleted
        404:
          $ref: "#/components/responses/NotFound"
          description: Example data not found
  /api/test-results:
    get:
      tags:
        - Test Results
      summary: Get all test results
      description: Get all test results of an organization ordered by creation date descending. Supports filtering by data contract and server. For performance reasons, checks and logs are not included in the response. Use the GET /api/test-results/{id} endpoint to get full details including checks and logs.
      operationId: getAllTestResults
      parameters:
        - in: query
          name: dataContractId
          schema:
            type: string
          required: false
          example: search-queries-all
          description: Filter by data contract ID.
