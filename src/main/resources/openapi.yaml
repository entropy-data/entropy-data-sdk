                $ref: '#/components/schemas/ExampleData'
        404:
          $ref: "#/components/responses/NotFound"
          description: Example data not found
    put:
      tags:
        - Example Data
      summary: Create or update example data
      operationId: putExampleData
      requestBody:
        required: true
        content:
          'application/json':
