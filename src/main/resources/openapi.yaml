          example: "update-my-contract-1706000000"
        title:
          type: string
          description: Title of the pull request / merge request. If not provided, a default title is generated.
          example: "Update contracts/my-contract.yaml"
        comment:
          type: string
          description: Optional description or comment for the pull request / merge request.
          example: "Automated update via API"
    Definition:
