  /api/settings/scim-mapping:
    get:
      tags:
        - Organization
      summary: Get SCIM mapping
      description: Get the SCIM group mapping configuration for the organization. Requires an organization-scoped API key.
      operationId: getScimMapping
      responses:
        200:
          description: The SCIM mapping YAML or JSON
          content:
            'application/yaml':
              schema:
                type: string
                description: The SCIM mapping YAML
                example: |
                  scimGroupMappings:
                    - scimGroup: admins
                      type: organizationOwner
                    - scimGroup: data-team
                      type: teamMemberRole
                      teamId: my-team
                      teamMemberRole: owner
            'application/json':
              schema:
                $ref: '#/components/schemas/ScimMappingConfiguration'
        403:
          $ref: "#/components/responses/Forbidden"
          description: API key does not have organization scope
    put:
      tags:
        - Organization
      summary: Update SCIM mapping
      description: Update the SCIM group mapping configuration for the organization. Requires an organization-scoped API key with write permissions.
      operationId: putScimMapping
      requestBody:
        required: true
        content:
          'application/yaml':
            schema:
              type: string
              description: The SCIM mapping YAML
              example: |
                scimGroupMappings:
                  - scimGroup: admins
                    type: organizationOwner
                  - scimGroup: data-team
                    type: teamMemberRole
                    teamId: my-team
                    teamMemberRole: owner
          'application/json':
            schema:
              $ref: '#/components/schemas/ScimMappingConfiguration'
      responses:
        200:
          description: SCIM mapping updated
        403:
          $ref: "#/components/responses/Forbidden"
          description: API key does not have organization scope
        422:
          $ref: "#/components/responses/UnprocessableEntity"
          description: Invalid YAML format
  /api/integrations:
    get:
      tags:
        - Integrations
      summary: List integrations
      description: List integrations visible to the API key. Supports optional filtering by owning team, source platform, and schedule-enabled state.
      operationId: listIntegrations
      parameters:
        - in: query
          name: owningTeamExternalId
          schema:
            type: string
          required: false
          description: Filter to integrations owned by a specific team (team external id).
        - in: query
          name: source
          schema:
            type: string
            enum: [snowflake, databricks, bigquery, postgres, mysql, mariadb, mssql, glue, alation, fabric, powerbi]
          required: false
          description: Filter to integrations of a specific source platform.
        - in: query
          name: enabled
          schema:
            type: boolean
          required: false
          description: Filter to integrations whose schedule is enabled or disabled.
      responses:
        200:
          description: List of integrations visible to the API key, each with the most recent ingestion run embedded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Integration'
  /api/integrations/{externalId}:
    parameters:
      - name: externalId
        in: path
        description: The externalId of the integration.
        required: true
        schema:
          type: string
    get:
      tags:
        - Integrations
      summary: Get an integration
      description: >-
        Get a single integration, including its decrypted provider configuration (credentials excluded).
        For the latest run use `GET /api/integrations/{externalId}/runs/latest`.
      operationId: getIntegration
      responses:
        200:
          description: The integration, with its configuration inlined.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Integration'
        404:
          $ref: "#/components/responses/NotFound"
          description: Integration not found, or the API key cannot see it.
  /api/integrations/{externalId}/runs:
    parameters:
      - name: externalId
        in: path
        description: The externalId of the integration.
        required: true
        schema:
          type: string
    get:
      tags:
        - Integrations
      summary: List ingestion runs
      description: List past runs for an integration, most recent first.
      operationId: listIntegrationRuns
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          required: false
          description: Maximum number of runs to return. Capped at 200.
        - in: query
          name: status
          schema:
            type: string
            enum: [RUNNING, SUCCESS, FAILED, CANCELLED]
          required: false
          description: Filter to runs of a specific status.
      responses:
        200:
          description: List of ingestion runs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IngestionRun'
  /api/integrations/{externalId}/runs/latest:
    parameters:
      - name: externalId
        in: path
        description: The externalId of the integration.
        required: true
        schema:
          type: string
    get:
      tags:
        - Integrations
      summary: Get the latest ingestion run
      description: Get the most recent ingestion run for an integration.
      operationId: getLatestIntegrationRun
      responses:
        200:
          description: The most recent ingestion run.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionRun'
        404:
          $ref: "#/components/responses/NotFound"
          description: Integration not found, or it has never run.
  /api/integrations/{externalId}/runs/{ingestionRunId}:
    parameters:
      - name: externalId
        in: path
        description: The externalId of the integration.
        required: true
        schema:
          type: string
      - name: ingestionRunId
        in: path
        description: The ID of the ingestion run.
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - Integrations
      summary: Get an ingestion run
      description: Get a single ingestion run's status, asset counts, and timing.
      operationId: getIntegrationRun
      responses:
        200:
          description: The ingestion run.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionRun'
        404:
          $ref: "#/components/responses/NotFound"
          description: Run not found, or it does not belong to the specified integration.
  /api/integrations/{externalId}/run:
    parameters:
      - name: externalId
        in: path
        description: The externalId of the integration.
        required: true
        schema:
          type: string
    post:
      tags:
        - Integrations
      summary: Trigger a manual ingestion run
      description: |
        Schedule a one-shot ingestion run. Returns immediately (`202 Accepted`); the actual `IngestionRun`
        row is created by the scheduler once it picks the task up, normally within seconds.

        Requires `INGESTION_EDIT` on the integration's owning team, or organization-owner privileges
        when the integration has no owning team.

        To wait for completion, poll `GET /api/integrations/{externalId}/runs/latest` and watch
        the `status` field transition from `RUNNING` to one of `SUCCESS`, `FAILED`, or `CANCELLED`.
      operationId: triggerIntegrationRun
      responses:
        202:
          description: Run scheduled successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerRunResponse'
        403:
          $ref: "#/components/responses/Forbidden"
          description: API key lacks permission to trigger a run for this integration.
        404:
          $ref: "#/components/responses/NotFound"
          description: Integration not found.
        409:
          description: A run is already in progress for this integration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationConflict'
  /api/integrations/{externalId}/cancel:
    parameters:
      - name: externalId
        in: path
        description: The externalId of the integration.
        required: true
        schema:
          type: string
    post:
      tags:
        - Integrations
      summary: Cancel the running ingestion
      description: |
        Cancel a currently running ingestion. The cancel flag is set immediately; the in-flight
        run observes the flag on its next iteration and finishes with status `CANCELLED`.

        Requires `INGESTION_EDIT` on the integration's owning team, or organization-owner privileges
        when the integration has no owning team.
      operationId: cancelIntegrationRun
      responses:
        204:
          description: Cancellation requested.
        403:
          $ref: "#/components/responses/Forbidden"
          description: API key lacks permission to cancel a run for this integration.
        404:
          $ref: "#/components/responses/NotFound"
          description: Integration not found.
  /api/connectors:
    get:
      tags:
        - Connectors
      summary: Get all connectors
      description: Get all connectors of an organization.
      operationId: getConnectors
      responses:
        200:
          description: List of all connectors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Connector'
  /api/connectors/{id}:
    parameters:
